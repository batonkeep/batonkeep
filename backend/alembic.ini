# alembic.ini — migration config (D-0021).
# The database URL is NOT set here; env.py derives it from app.config.get_settings()
# (a sync driver derived from DATABASE_URL) so there is a single source of truth and
# the same env var drives the app and migrations (SQLite now, Postgres-capable for a
# future control plane — D-0021).

[alembic]
script_location = alembic
prepend_sys_path = .
# Use a path-safe slug + a zero-padded revision counter for readable, ordered files.
file_template = %%(rev)s_%%(slug)s

# Logging is configured by the application (app/logging_config.py); env.py deliberately
# does NOT call fileConfig so alembic never clobbers the app's structured logging.
