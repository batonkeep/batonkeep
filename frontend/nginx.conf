# Forward the original scheme when a TLS-terminating proxy (cloudflared, an
# external reverse proxy) sits in front; fall back to our own scheme otherwise.
map $http_x_forwarded_proto $fwd_proto {
    default $scheme;
    "~."    $http_x_forwarded_proto;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Common proxy headers — make the backend see the real client + public scheme
    # even when reached through cloudflared or another reverse proxy.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $fwd_proto;

    # Proxy /api to backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
    }

    # Proxy /ws WebSocket to backend
    location /ws {
        proxy_pass http://backend:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_read_timeout 3600s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
