# ── Batonkeep — install / production compose ──────────────────────────────────
# Pulls prebuilt images from GHCR (no build context required). This is the file a
# self-hoster downloads; the three-line install is:
#
#   curl -fsSLO https://raw.githubusercontent.com/batonkeep/batonkeep/main/docker-compose.yml
#   curl -fsSL  https://raw.githubusercontent.com/batonkeep/batonkeep/main/.env.example -o .env  # then edit
#   curl -fsSLO https://raw.githubusercontent.com/batonkeep/batonkeep/main/searxng-settings.yml
#   docker compose up -d
#
# The searxng-settings.yml file (downloaded next to this one) enables the SearXNG
# web-search backend. Skip it and web_search transparently falls back to the
# DuckDuckGo scrape (lower recall).
#
# Then log in to your plan CLIs:  docker compose exec -u sandbox -e HOME=/home/agent backend bash /app/scripts/auth.sh
#
# Single exposed surface: the frontend nginx (serves the SPA and reverse-proxies
# /api + /ws to the backend over the internal network). The backend is NOT
# published to the host. Put TLS / a public domain in front of the one web port
# with your own reverse proxy or a cloudflared tunnel — see docs/self-hosting.md.
#
# WEB_BIND  — host interface for the web port. Default 0.0.0.0 (LAN/VPS reachable).
#             Set WEB_BIND=127.0.0.1 to expose only to a local tunnel (cloudflared).
# WEB_PORT  — host port for the web UI (default 8080).
# TAG       — image tag to run (default latest; pin to a specific release tag in production).
#
# Project name is pinned via COMPOSE_PROJECT_NAME in .env (default batonkeep) so
# container + volume names are deterministic regardless of the install folder.
#
# Contributors building from source: docker-compose.override.yml (auto-merged
# from a repo clone) adds local `build:` so `make up` builds instead of pulls.

services:
  backend:
    image: ghcr.io/batonkeep/batonkeep-backend:${TAG:-latest}
    env_file: .env
    environment:
      # Web-search backend: point the `web_search` tool at the
      # internal SearXNG service. Override in .env to use an external instance, or
      # set empty to disable SearXNG (DDG-scrape-only). DDG is the auto fallback.
      - SEARXNG_URL=${SEARXNG_URL:-http://searxng:8080}
    # Note: HOME is intentionally NOT set here. A container-wide HOME would leak
    # into `docker exec -u sandbox` and agent subprocesses, masking sandbox's real
    # home (/home/agent). The backend gets HOME=/home/batond from entrypoint.sh;
    # everything else resolves HOME from /etc/passwd per user.
    volumes:
      - appdata:/data
      # sandbox's home — persists plan-CLI OAuth; mount path unchanged so existing
      # auth on the agent_home volume keeps working after the user split.
      - agent_home:/home/agent
    # No host port: the backend is reachable only on the internal compose network.
    expose:
      - "8000"
    restart: unless-stopped
    mem_limit: 768m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: ghcr.io/batonkeep/batonkeep-frontend:${TAG:-latest}
    ports:
      # The one exposed surface. Bind to 127.0.0.1 (WEB_BIND) for tunnel-only hosts.
      - "${WEB_BIND:-0.0.0.0}:${WEB_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Self-hosted, key-free metasearch backing the `web_search` tool.
  # Internal-only (not published); the backend reaches it at http://searxng:8080.
  # Mounts the single ./searxng-settings.yml (alongside this file — no dir to create),
  # which enables the JSON API web_search needs (the upstream default disables it). A
  # curl-only install fetches it next to docker-compose.yml (see the header); if it's
  # absent web_search transparently falls back to the DuckDuckGo scrape.
  searxng:
    image: searxng/searxng:latest
    expose:
      - "8080"
    volumes:
      - ./searxng-settings.yml:/etc/searxng/settings.yml:rw
    restart: unless-stopped
    mem_limit: 256m

  # Optional self-hosted open-weight inference — activate with: make selfhost
  # or: docker compose --profile selfhost up -d
  inference:
    profiles: [selfhost]
    image: ollama/ollama:latest
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  appdata:
  agent_home:
  ollama_data:
