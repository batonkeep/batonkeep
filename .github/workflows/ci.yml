name: CI

# Enforces the Verify discipline at the PR boundary: backend lint +
# tests (including the alembic drift guard) and the frontend type-check/build.
# The lint gate is a clean baseline — `ruff check` must report zero findings.

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same PR cancels its in-flight run (saves CI on rapid pushes).
# Pushes to main are NOT cancelled — every merge runs to completion so the default
# branch always has a real pass/fail (and the README CI badge stays reliable, not
# left showing a "cancelled" run when merges land close together).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  backend:
    name: backend — lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Sync dependencies (locked)
        run: uv sync --frozen

      # ruff version is pinned via the dev dependency group, so CI and local agree.
      - name: Lint (ruff check — zero-finding gate)
        run: uv run ruff check app/

      - name: Tests (pytest + alembic drift guard)
        run: uv run pytest tests/ -q

  # P-0072: the workspace jail is kernel-enforced, so unit tests can only cover
  # the policy around it. This job proves the fence itself on a Landlock-capable
  # kernel — the one place in the pipeline that can. It skips loudly (never
  # silently) if the runner image ever ships without Landlock.
  jail:
    name: sandbox — workspace jail (Landlock)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify an agent cannot reach another session's workspace
        run: sudo backend/scripts/verify-jail.sh

  frontend:
    name: frontend — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (locked)
        run: npm ci

      # `npm run build` is `tsc --noEmit && vite build` — type-check + production bundle.
      - name: Type-check + build
        run: npm run build
