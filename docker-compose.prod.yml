name: batonkeep

# ── Production compose ────────────────────────────────────────────────────────
# All images are pulled from the registry — no build context required.
# Workflow on the target host:
#   1. Pull the base + frontend from the registry:
#        docker compose -f docker-compose.prod.yml pull frontend
#   2. Build the thin runtime backend layer locally (uses base from registry):
#        REGISTRY_PREFIX=registry.example.com/batonkeep/ TAG=v1.0 \
#          docker compose -f docker-compose.prod.yml build backend
#   3. Start everything:
#        docker compose -f docker-compose.prod.yml up -d
#
# Required env vars (set in shell or a .env file):
#   REGISTRY_PREFIX  e.g. registry.example.com/batonkeep/  (trailing slash)
#   TAG              e.g. v1.0  (defaults to latest)

services:
  backend:
    build:
      context: backend
      dockerfile: Dockerfile
      args:
        REGISTRY_PREFIX: ${REGISTRY_PREFIX:-}
        TAG: ${TAG:-latest}
    image: ${REGISTRY_PREFIX:-}batonkeep-backend:${TAG:-latest}
    env_file: .env
    # Note: HOME is intentionally NOT set here. A container-wide HOME would leak
    # into `docker exec -u sandbox` and agent subprocesses, masking sandbox's real
    # home (/home/agent). The backend gets HOME=/home/batond from entrypoint.sh;
    # everything else resolves HOME from /etc/passwd per user.
    volumes:
      - appdata:/data
      # sandbox's home — plan-CLI OAuth; mount path unchanged across the split.
      - agent_home:/home/agent
    ports:
      - "8000:8000"
    restart: always
    mem_limit: 768m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: ${REGISTRY_PREFIX:-}batonkeep-frontend:${TAG:-latest}
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional self-hosted open-weight inference — activate with:
  #   docker compose -f docker-compose.prod.yml --profile selfhost up -d
  inference:
    profiles: [selfhost]
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  appdata:
  agent_home:
  ollama_data:
