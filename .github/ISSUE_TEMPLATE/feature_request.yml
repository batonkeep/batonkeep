name: Feature request
description: Suggest a capability or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For open-ended ideas, consider starting a
        [Discussion](https://github.com/batonkeep/batonkeep/discussions) first.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case or pain point — not just the proposed solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Batonkeep to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried or other approaches you weighed.
