name: Release

# Builds and pushes the multi-arch (amd64 + arm64) backend and frontend images to
# GHCR on a version tag. GHCR has no anonymous pull-rate limits, pushes with the
# native GITHUB_TOKEN (no extra secret), and lives next to the repo — so a fresh
# self-host can `docker pull` with no login once the packages are made public.
#
# Trigger: push a tag like `v0.1.0`. The images are tagged `v0.1.0` (matching the
# git tag, as the docs instruct), `0.1.0`, and `latest`. After the first run, make
# each package Public + link it to the repo
# (one-time, in the package settings) so unauthenticated pulls work.

on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/batonkeep

jobs:
  images:
    name: build + push ${{ matrix.component }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - component: backend
            context: backend
          - component: frontend
            context: frontend
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.component }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build + push (amd64 + arm64)
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Stamp the running version into the backend image from the git tag
          # (e.g. "v0.4.0") so /api/version + the UI report it (D-0053). The
          # frontend Dockerfile ignores the unused arg.
          build-args: |
            BATONKEEP_VERSION=${{ github.ref_name }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
